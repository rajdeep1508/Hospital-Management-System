{% extends "base.html" %}

{% block content %}

<h2>Doctor Dashboard</h2>

<h3>Your Appointments</h3>

<table border="1">

<tr>
<th>Patient Name</th>
<th>Date</th>
<th>Time</th>
<th>Action</th>
</tr>

{% for a in appointments %}

<tr>
<td>{{a[1]}}</td>
<td>{{a[2]}}</td>
<td>{{a[3]}}</td>

<td>
<a href="{{ url_for('doctor_add_treatment', appointment_id=a[0]) }}">
<button>Add Treatment</button>
</a>
</td>

</tr>

{% endfor %}

</table>


{% endblock %}
