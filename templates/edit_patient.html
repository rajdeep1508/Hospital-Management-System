{% extends "base.html" %}

{% block content %}

<h2>Edit Patient</h2>

<form method="POST">

Name:
<input type="text" name="name" value="{{patient[1]}}"><br><br>

Age:
<input type="number" name="age" value="{{patient[2]}}"><br><br>

Gender:
<input type="text" name="gender" value="{{patient[3]}}"><br><br>

Phone:
<input type="text" name="phone" value="{{patient[4]}}"><br><br>

<button type="submit">Update Patient</button>

</form>

{% endblock %}
